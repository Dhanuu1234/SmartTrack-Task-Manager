<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SmartTrack — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body{background:linear-gradient(135deg,#1e3a8a,#1d4ed8,#3b82f6);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;}
.login-card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.25);}
.brand-icon{width:64px;height:64px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px;}
.form-control{border-radius:10px;padding:.75rem 1rem;border:1.5px solid #e2e8f0;}
.form-control:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.btn-login{background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:12px;padding:.875rem;font-weight:700;font-size:1rem;letter-spacing:.3px;}
.demo-pill{cursor:pointer;transition:all .2s;}
.demo-pill:hover{background:#eff6ff!important;border-color:#bfdbfe!important;}
</style>
</head>
<body>
<div class="login-card">
  <div class="brand-icon">📋</div>
  <h3 class="text-center fw-bold mb-1">SmartTrack</h3>
  <p class="text-center text-muted mb-4" style="font-size:.9rem;">Employee Task Management System</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}
      <div class="alert alert-{{cat}} alert-dismissible rounded-3 py-2" role="alert">
        {{msg}}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold small text-uppercase text-muted">Email</label>
      <input type="email" name="email" class="form-control" value="admin@smarttrack.com" required/>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold small text-uppercase text-muted">Password</label>
      <input type="password" name="password" class="form-control" value="admin123" required/>
    </div>
    <button type="submit" class="btn btn-primary btn-login w-100 text-white">Sign In →</button>
  </form>

  <hr class="my-3"/>
  <p class="text-center text-muted" style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Quick Demo Login</p>
  <div class="row g-2">
    <div class="col-6">
      <div class="demo-pill border rounded-3 p-2 text-center" onclick="setLogin('admin@smarttrack.com','admin123')">
        <div style="font-size:1.2rem;">🛡️</div>
        <div class="fw-bold" style="font-size:.8rem;">Admin</div>
        <div class="text-muted" style="font-size:.7rem;">Full access</div>
      </div>
    </div>
    <div class="col-6">
      <div class="demo-pill border rounded-3 p-2 text-center" onclick="setLogin('dhanshree@smarttrack.com','pass123')">
        <div style="font-size:1.2rem;">👤</div>
        <div class="fw-bold" style="font-size:.8rem;">Employee</div>
        <div class="text-muted" style="font-size:.7rem;">Dhanshree Zagde</div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function setLogin(e,p){
  document.querySelector('[name=email]').value=e;
  document.querySelector('[name=password]').value=p;
  document.querySelector('form').submit();
}
</script>
</body>
</html>
